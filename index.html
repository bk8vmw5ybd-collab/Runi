<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#120920" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Руны" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Каталог рун</title>
  <style>
    :root {
      --bg:#080511; --card:rgba(255,255,255,.08); --line:rgba(255,255,255,.15);
      --gold:#f4cd77; --gold2:#ffe3a2; --text:#fff8ea; --muted:#d2c2e8;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(circle at 50% -15%, rgba(244,205,119,.22), transparent 31%),
        radial-gradient(circle at 0% 20%, rgba(111,65,190,.28), transparent 28%),
        linear-gradient(145deg,#211032,var(--bg) 72%);
      padding:20px;
    }
    body:before {
      content:""; position:fixed; inset:0; pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,.032) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.026) 1px,transparent 1px);
      background-size:38px 38px; mask-image:radial-gradient(circle at center, black, transparent 76%);
    }
    .app { width:100%; max-width:760px; margin:0 auto; position:relative; z-index:1; }
    header { padding:18px 4px 14px; }
    .tag {
      display:inline-flex; gap:8px; align-items:center; padding:8px 12px; border-radius:999px;
      background:rgba(244,205,119,.08); border:1px solid rgba(244,205,119,.25);
      color:var(--gold2); font-size:13px; margin-bottom:14px;
    }
    h1 { font-size:clamp(38px,9vw,64px); line-height:.92; letter-spacing:-2px; margin:0; }
    .lead { color:var(--muted); line-height:1.5; font-size:17px; margin:16px 0 18px; }
    .search {
      position:sticky; top:10px; z-index:5; padding:10px 0 12px;
      backdrop-filter:blur(14px);
    }
    input {
      width:100%; min-height:56px; border:1px solid var(--line); border-radius:20px;
      padding:0 17px; font-size:17px; color:white; background:rgba(255,255,255,.11);
      outline:none;
    }
    input::placeholder { color:rgba(255,255,255,.55); }
    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:10px; }
    .rune-btn {
      text-align:left; color:var(--text); border:1px solid var(--line); border-radius:24px;
      background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.055));
      padding:16px; min-height:128px; box-shadow:0 18px 55px rgba(0,0,0,.22);
    }
    .rune-symbol { font-size:44px; color:var(--gold2); text-shadow:0 0 22px rgba(244,205,119,.45); line-height:1; }
    .rune-name { font-weight:950; font-size:19px; margin-top:9px; }
    .rune-latin { color:var(--gold2); font-size:13px; margin-top:2px; }
    .rune-short { color:var(--muted); font-size:13px; line-height:1.3; margin-top:8px; }
    .modal {
      display:none; position:fixed; inset:0; z-index:20; background:rgba(4,2,8,.72);
      backdrop-filter:blur(10px); padding:18px; overflow:auto;
    }
    .modal.open { display:block; }
    .panel {
      max-width:720px; margin:12px auto 28px; border-radius:32px; border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(18,9,32,.96));
      box-shadow:0 28px 90px rgba(0,0,0,.55); overflow:hidden;
      animation:rise .28s ease both;
    }
    @keyframes rise { from { opacity:0; transform:translateY(18px) scale(.98); } to { opacity:1; transform:none; } }
    .panel-head { padding:24px 22px 18px; text-align:center; position:relative; }
    .close {
      position:absolute; right:14px; top:14px; width:42px; height:42px; border-radius:50%;
      border:1px solid var(--line); background:rgba(255,255,255,.08); color:white; font-size:24px;
    }
    .big-symbol { font-size:104px; color:var(--gold2); text-shadow:0 0 20px rgba(244,205,119,.72),0 0 58px rgba(244,205,119,.24); }
    .big-name { font-size:36px; font-weight:950; letter-spacing:.4px; }
    .big-latin { color:var(--gold2); margin-top:4px; }
    .summary { color:#eadff8; line-height:1.55; padding:0 22px 18px; text-align:center; }
    .full {
      max-height:none; white-space:pre-wrap; padding:20px 22px 28px; line-height:1.58;
      color:#f0e9fb; font-size:15px; background:rgba(0,0,0,.2); border-top:1px solid var(--line);
    }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 22px 22px; }
    button.action {
      min-height:52px; border:0; border-radius:17px; font-weight:900; font-size:15px;
      background:linear-gradient(180deg,var(--gold2),var(--gold)); color:#1a1028;
    }
    button.action.ghost { background:rgba(255,255,255,.1); color:white; border:1px solid var(--line); }
    .install { color:#b9acd1; font-size:13px; text-align:center; line-height:1.45; padding:20px 4px 34px; }
    @media (min-width:650px) { .grid { grid-template-columns:repeat(3,1fr); } }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="tag">ᚱ Школа Рун Константина Минздрава</div>
      <h1>Каталог рун</h1>
      <p class="lead">Выбери руну и прочитай её авторское значение. Работает без ИИ, без сервера и после установки на iPhone может открываться офлайн.</p>
    </header>

    <div class="search">
      <input id="search" type="search" placeholder="Поиск: Феху, сила, путь, защита..." oninput="renderRunes()" />
    </div>

    <section class="grid" id="grid"></section>
    <div class="install">Чтобы поставить как приложение: открой сайт в Safari → Поделиться → На экран «Домой».</div>
  </main>

  <section class="modal" id="modal" onclick="backgroundClose(event)">
    <article class="panel">
      <div class="panel-head">
        <button class="close" onclick="closeRune()">×</button>
        <div class="big-symbol" id="mSymbol"></div>
        <div class="big-name" id="mName"></div>
        <div class="big-latin" id="mLatin"></div>
      </div>
      <div class="summary" id="mShort"></div>
      <div class="actions">
        <button class="action ghost" onclick="closeRune()">К списку</button>
        <button class="action" onclick="shareRune()">Поделиться</button>
      </div>
      <div class="full" id="mFull"></div>
    </article>
  </section>

  <script>
    const runes = [{"symbol": "ᚠ", "name": "ФЕХУ", "latin": "Fehu", "short": "Энергообмен. Приём и отдача.", "full": "РУНА «ФЕХУ».  \n... \n🌟 Архетип, Общий Смысл, Абстрактный Образ. \nЭнерго-обмен. Приём-отдача. Единовременная отдача и \nполучение чего-либо. \n... \n⚖ Закон, Принцип, Свойство, Вездесущий Параметр, Функция \nтой или иной системы в Мироздании (общая для любых систем). \nЛюбая локальная система во Вселенной постоянно что-то \nвыделяет от себя во вне, и единовременно что-то получает из вне.  \n... \n🌏 Пример конкретного проявления в обычной жизни. \nПродавец отдаёт товар покупателю (отдача) и получает за это \nденежные средства (получение). \n\n... \n✨ Пример проявления на «тонком» плане и в энерго-\nинформационном смысле. \nВерхняя чакра человека получает энергию от более Высоких \nАспектов (например от ВЯ человека), и единовременно отдаёт \nимпульсы в человеческое сознание и разум. \n... \n😈 «Теневая» и «злая» сторона, возможное «плохое» проявление, \nи издержки. Нарушение Закона Руны. \nЧеловек отдаёт другому человеку всё своё свободное время, \nпроявляя заботу о нем, а взамен получает негативные эмоции от \nэтого человека (недовольство, ворчание, и т.п). Вроде энерго-\nобмен есть - но не «дерьмовый» ли он? \nКогда вы что-то отдаёте от себя - неминуемо включается \nвнутренняя потребность что-то получить. Прям сразу, автоматом, \nединовременно. И если вы не получаете что-то для себя - то \nданная потребность будет как минимум для вас дискомфортна. \nВас будет откровенно «бомбить» изнутри. А в большинстве \nслучаев будет спроецирована на того человека, кому вы что-то \nотдали (и не получили от него при этом ничего). Кстати... Тут не \nимеет значение, реально ли вы что-то отдали. Или надумали себе. \nБывает так, что человек ничего вам не обещал и соответсвенно не \nдолжен ничего. Но вы себе придумали и «обиделись». \nЕщё одна издержка. От обратного. Когда вы что-то получили, и \nпри этом не отдали ничего - автоматом включается потенциал, по \nкоторому вы как бы должны что-то отдать. Очень хитрые \nмагические засранцы пользуются этим, и специально что-то \n\nмогут вам подкинуть, как «от чистого сердца», и на возникшем \nпотенциале поставить вам крадник. Вывод - не берите лишнего. А \nесли что-то взяли - то гасите возникший потенциал отдачи. \nЗапомните. Если у вас увеличивается поступление чего-либо из \nвне - то автоматически увеличивается потенциал и потребность в \nотдаче чего-либо во вне. Это Закон Природы. Так же и наоборот. \n... \n💩 Пример порчельного магического воздействия. \nМожно через данную руну подключиться к любому из \nсуществующих у человека внутренних энерго-обменов - и \nнарушить его по своему усмотрению. \nМожно наладить некий пагубный энерго-обмен (чтоб у человека \nутекало хорошее для него, а приходило плохое). \n... \n💊🛡 Пример целительного, очистительного, гармонизирующего \nили защитного магического воздействия. \nВсё просто. Данной руной мы можем восстановить и \nактивировать нормальный для нашего Существа энерго-обмен с \nвнешним миром. Отдавать от себя то, чего у нас в избытке \n(таланты), и получать за это то, чего нам не хватает (например \nденьги). \n... \n❤ Пример любовного магического воздействия. \n\nГармонизация обмена между партнёрами. Мужчина отдаёт от \nсебя мужское, а женщина отдаёт женское. Приём-получение \nлюбви и заботы, в обе стороны и равноценно. \n... \n💰 Пример денежного магического воздействия. \nБизнес получает клиентов, которые готовы платить деньги. При \nусловии наличия хороших продуктов/товаров/услуг, которые бы \nудовлетворили потребности клиентов."}, {"symbol": "ᚢ", "name": "УРУЗ", "latin": "Uruz", "short": "Мощность. Телесность. Первородная сила.", "full": "РУНА «УРУЗ».  \n... \n🌟 Архетип, Общий Смысл, Абстрактный Образ. \nМощность. Наращивание массы, массивности и телесности. \nУсиление чего-либо имеющегося. Глубинная Первородная Сила. \n... \n⚖ Закон, Принцип, Свойство, Вездесущий Параметр, Функция \nтой или иной системы в Мироздании (общая для любых систем). \n\nМощность, от слова «мощи». Т.е «тело». Любая локальная \nсистема во Вселенной имеет хотя бы одно проявленное тело. \nЕсли что-либо можно назвать словами, или хотя бы представить - \nу этого уже есть некое тело. Без наличия хоть какого-то тела - \nневозможно существовать в Мироздании. \nТак же. Очень важно. Именно среда обитания обеспечивает \n«оболочкой» того, кто в эту среду попадает. Невозможно обитать \nв среде, если не соприкасаешься с ней. Граница соприкосновения \nсубъекта и среды обитания - и есть оболочка/тела (аспект \nмощности). \n... \n🌏 Пример конкретного проявления в обычной жизни. \nПри устройстве на работу человек получает рабочую форму и \nинструменты для осуществления работы. Фирма даёт ему это. \nЧеловек становится локально мощнее, в рамках своей работы. \nЕщё пример. Печально известный для многих (хотя для \nнекоторых наоборот это за счастье). Человек толстеет... Неважно, \nчто наращивается, мышцы или целлюлит - мощность в любом из \nслучаев увеличивается.  \n... \n✨ Пример проявления на «тонком» плане и в энерго-\nинформационном смысле. \nЧеловек устанавливает на себя защитную оболочку от той или \nиной Стихии. Тем самым увеличивается общая мощность \nчеловека. \n\nПопадая в собственный сон - человек получает «тело сна». Само \nподсознание даёт данную мощность для сознания человека.  \n... \n😈 «Теневая» и «злая» сторона, возможное «плохое» проявление, \nи издержки. Нарушение Закона Руны. \nМожно обрасти «дерьмом»... \nНакопить у себя можно массу пагубных вещей. \nОдеться можно в лохмотья. \nПопадая в среду обитания под названием «болото» - мы получаем \nсоответствующую «оболочку». \nЕщё момент... Человек может увеличить мощность \nисключительно за счёт прибавления её из вне. Из ничего он взять \nеё не может. Именно поэтому, если мы себе «наколдуем» защиту, \nи при этом не уточним, откуда возьмётся «тесто» для данной \nзащиты - мы неминуемо лишимся чего-либо из того, что у нас \nесть сейчас (например здоровья). \n... \n💩 Пример порчельного ример конкретного проявления в обычной жизни. \nВася бьет морду Паше. Тем самым структурирует окружающее \nпространство (Пашу) под себя и свои нужды. \nПаша в ответ на удар Васи - выставляет блок рукой. Тем самым \nзащищаясь. А защита своего порядка от окружения = то же самое. \n... \n✨ Пример проявления на «тонком» плане и в энерго-\nинформационном смысле. \nСущность разрушает тонкое тело человека. \nПриродные Духи помогают человеку и вычищают из него \nчужеродный поставленный негатив. \nОдин «злой колдун» ставит порчу другому «доброму бедному \nнесчастному колдуну». \n... \n😈 «Теневая» и «злая» сторона, возможное «плохое» проявление, \nи издержки. Нарушение Закона Руны. \nПрименив данную руну на себе - вероятнее всего усилится \nсобственная агрессивность. Поэтому необходимо тщательней \n«метиться». \nЕсли вы не проявляете должной наглости и инициативы по \nотношению к окружающему миру - в вас будет нарастать \nпотребность в агрессии. Ибо Закон есть Закон и соблюдать его \n\nвсе равно придётся... А долго копить вы это не сможете. И \nсоответсвенно будете вымещать этот потенциал там, где не надо... \nНапример на близких. \nНу и надо понимать, что ТУРИСАЗ ТУРИСАЗУ - рознь... Можно \nструктурировать пространство и защищать близких, а можно \nразвернуть планетарную войну... \n... \n💩 Пример порчельного магического воздействия. \nСама порча как таковая. 😊 \nЛюбое агрессивное магическое воздействие. \nЛюбая защитная магия.  \nЛюбая жёсткая чистка. \n... \n💊🛡 Пример целительного, очистительного, гармонизирующего \nили защитного магического воздействия. \nКак вариант - разбить внутренние блоки. \nИли поставить жёсткую защиту. \n... \n❤ Пример любовного магического воздействия. \n\nМожно увеличить в «мягкотелом» партнёре недостающие \nсильные качества. \nМожно поставить защиту на отношения. \n... \n💰 Пример денежного магического воздействия. \nАгрессивное подталкивание покупателей совершить покупку. \nВытеснение конкурентов или защита от них."}, {"symbol": "ᚨ", "name": "АНС роявления на «тонком» плане и в энерго-\nинформационном смысле. \nСоздание кристаллов. \n... \n😈 «Теневая» и «злая» сторона, возможное «плохое» проявление, \nи издержки. Нарушение Закона Руны. \n«Якоря» бывают очень пагубные, и от них потом очень сложно \nизбавиться... \nОпыт - штука ответственная и опасная. Если вы получите \nсерьёзный пагубный опыт, то его потом просто так «волшебной \nпалочкой» не вычистишь. Необходим равный по весу \nпротивоположный позитивный опыт, что бы переписать старый. \nФакт случившегося важно ещё правильно оценивать. Ибо на \nВосходящей Силе (когда возносится опыт) идёт буквально \nпрограммирование личного Верхнего Мира. И в моменте \nсвершения какого-то поступка - важно правильно осознавать \nслучившееся. Ибо данная программа уйдёт Наверх. \n... \n💩 Пример порчельного магического воздействия. \n\nПровоцирование негативного опыта на событийном плане у \nчеловека. \nВклинивание в Восходящий процесс, с целью программирования \nвозникшего опыта. \n... \n💊🛡 Пример целительного, очистительного, гармонизирующего \nили защитного магического воздействия. \nМощная Защита на что-либо существующее позитивное. \n... \n❤ Пример любовного магического воздействия. \nПланомерное программирование дальнейшей судьбы \nвлюблённых, через их совместный опыт. \n... \n💰 Пример денежного магического воздействия. \nМожно сделать из своих текущих накоплений некий Высший \nДенежный Магнит. Факт наличия денег - сделать Опытом и Его \nСилой (которая будет привлекать новые денежные \nобстоятельства). \n..."}, {"symbol": "ᛞ", "name": "ДАГАЗ", "latin": "Dagaz", "short": "Точка сборки. Прорыв. Интеграция.", "full": "РУНА «ДАГАЗ».  \n... \n🌟 Архетип, Общий Смысл, Абстрактный Образ: \nТочка сборки. Прорыв. Интеграция. Одномоментный синтез \nпротивоположностей, когда прошлое и будущее, тьма и свет, \nвнутреннее и внешнее, верх и низ сходятся в одной точке, \nпроизводя качественный скачок. \n⚖ Закон, Принцип, Свойство, Вездесущий Параметр, Функция \nтой или иной системы в Мироздании (общая для любых систем): \nУ любой системы в Мироздании есть сила, которая завершает \nстарый цикл и начинает новый не через последовательность, а \nчерез внезапный прорыв. Это сила рассвета, наступающего не \nплавно, а сразу. Она интегрирует всё накопленное в единое целое, \nгде противоположности не уничтожаются, а обретают новое \nединство. \n🌏 Пример конкретного проявления в обычной жизни: \nЧеловек долго мучается над задачей, не может найти решение — \nи внезапно его осеняет озарение. Конфликт между двумя \nсторонами, казавшийся неразрешимым, в один момент снимается \nчерез неожиданный компромисс или общую угрозу. Утром \nнаступает рассвет — не постепенное угасание тьмы, а \nпереломный момент, после которого свет окончательно \nпобеждает. \n✨ Пример проявления на «тонком» плане и в энерго-\nинформационном смысле: \n\nВ момент глубокой медитации или критической точки магической \nработы происходит скачок уровня сознания — практик внезапно \nвидит структуру реальности целиком. Кармический узел, который \nнельзя было распутать последовательно, в одно мгновение \nразрушается через высшее понимание. Энергетические потоки, \nдвигавшиеся хаотично, в точке Дагаз выстраиваются в идеальный \nкристалл. \n😈 «Теневая» и «злая» сторона, возможное «плохое» проявление, \nи издержки: \nПрорыв может быть разрушительным, если система к нему не \nготова — сознание «разрывает» на части, интеграция не удаётся, \nи человек получает фрагментацию психики. Рассвет может \nослепить, а не осветить. Внезапное единство \nпротивоположностей иногда достигается через уничтожение \nодной из сторон, а не через истинный синтез. Инерция и страх \nперемен заставляют систему сопротивляться Дагаз, и тогда сила \nпрорыва реализуется как катастрофа, а не как озарение. \n💩 Пример порчельного магического воздействия: \nПринудительный, насильственный «прорыв» сознания жертвы с \nподселением сущности, что приводит к шизофрении или \nраздвоению личности. Искусственное столкновение \nпротивоположных сил в человеке (например, долга и страсти) с \nцелью вызвать внутренний взрыв и разрушить его волю. \n💊🛡 Пример целительного, очистительного, гармонизирующего \nили защитного магического воздействия: \nМгновенное снятие давнего блока или застарелой травмы через \nозарение и принятие. Интеграция разрозненных аспектов \nличности в единое «Я» (сборка себя). Защита, которая \nактивируется не постепенно, а мгновенным скачком в \nкритический момент. \n\n❤ Пример любовного магического воздействия: \nВнезапный переход отношений на новый уровень — например, \nпосле затяжного кризиса пара в одно мгновение обретает полное \nвзаимопонимание. Или вспышка любви «с первого взгляда», где \nдве противоположности мгновенно находят друг друга. \n💰 Пример денежного магического воздействия: \nРезкий прорыв в бизнесе после длительного застоя — \nнеожиданный крупный контракт, выигрыш тендера, инсайт, \nменяющий стратегию. Точка бифуркации, после которой \nденежный поток качественно меняет свою мощность."}];
    let currentRune = null;

    function renderRunes() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      runes
        .filter(r => !q || (r.name + " " + r.latin + " " + r.short + " " + r.full).toLowerCase().includes(q))
        .forEach((r, i) => {
          const btn = document.createElement("button");
          btn.className = "rune-btn";
          btn.onclick = () => openRune(i);
          btn.innerHTML = `
            <div class="rune-symbol">${r.symbol}</div>
            <div class="rune-name">${r.name}</div>
            <div class="rune-latin">${r.latin}</div>
            <div class="rune-short">${r.short}</div>
          `;
          grid.appendChild(btn);
        });
    }

    function openRune(i) {
      currentRune = runes[i];
      document.getElementById("mSymbol").textContent = currentRune.symbol;
      document.getElementById("mName").textContent = currentRune.name;
      document.getElementById("mLatin").textContent = currentRune.latin;
      document.getElementById("mShort").textContent = currentRune.short;
      document.getElementById("mFull").textContent = currentRune.full;
      document.getElementById("modal").classList.add("open");
      document.body.style.overflow = "hidden";
      location.hash = currentRune.latin.toLowerCase();
    }

    function closeRune() {
      document.getElementById("modal").classList.remove("open");
      document.body.style.overflow = "";
      if (location.hash) history.pushState("", document.title, location.pathname + location.search);
    }

    function backgroundClose(e) {
      if (e.target.id === "modal") closeRune();
    }

    async function shareRune() {
      if (!currentRune) return;
      const text = currentRune.symbol + " " + currentRune.name + " — " + currentRune.short;
      if (navigator.share) {
        try { await navigator.share({title: currentRune.name, text, url: location.href}); } catch(e) {}
      } else {
        await navigator.clipboard.writeText(text + "\n" + location.href);
        alert("Ссылка скопирована");
      }
    }

    window.addEventListener("load", () => {
      renderRunes();
      const hash = decodeURIComponent(location.hash.replace("#","")).toLowerCase();
      if (hash) {
        const i = runes.findIndex(r => r.latin.toLowerCase() === hash || r.name.toLowerCase() === hash);
        if (i >= 0) setTimeout(() => openRune(i), 150);
      }
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js");
      }
    });
  </script>
